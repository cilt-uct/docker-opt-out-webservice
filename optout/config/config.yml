# app/config/config.yml
monolog:
    channels: ['ldap']  # Optional: create a separate channel for LDAP logs
    handlers:
        # Log all messages to a file
        main:
            type: stream
            path: "%kernel.logs_dir%/prod.log"
            level: info

        # Optional: Create a separate file for LDAP-specific logs
        ldap:
            type: stream
            path: "%kernel.logs_dir%/ldap.log"
            level: debug
            channels: ['ldap']
